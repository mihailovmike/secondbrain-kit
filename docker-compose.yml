services:
  secondbrain-qdrant:
    image: qdrant/qdrant:latest
    container_name: secondbrain-qdrant
    volumes:
      - ./qdrant_data:/qdrant/storage
    networks:
      - edge
    restart: unless-stopped

  secondbrain-daemon:
    build: .
    container_name: secondbrain-daemon
    volumes:
      - /home/miki_xbot/SecondBrain:/app/vault
    env_file: .env
    environment:
      - VAULT_PATH=/app/vault
      - INBOX_DIR_NAME=_inbox
      - LIGHTRAG_WORKING_DIR=/app/vault/.lightrag
      - LIGHTRAG_VECTOR_STORAGE=QdrantVectorDBStorage
      - QDRANT_URL=http://secondbrain-qdrant:6333
      - TELEGRAM_INBOX_CHAT_ID=-1003599063509
      - TELEGRAM_INBOX_THREAD_ID=2912
      - APPROVAL_MODE=approve
    ports:
      - "127.0.0.1:8789:8789"
    depends_on:
      - secondbrain-qdrant
    networks:
      - edge
    restart: unless-stopped

  secondbrain-webui:
    image: ghcr.io/hkuds/lightrag:latest
    container_name: secondbrain-webui
    volumes:
      - /home/miki_xbot/SecondBrain/.lightrag:/app/data
    environment:
      - AUTH_ACCOUNTS=mihail:secondbrain2026
      - TOKEN_SECRET=sb-atom8-jwt-2026-secret-key
      - HOST=0.0.0.0
      - PORT=9621
      - WORKING_DIR=/app/data
      - MAX_ASYNC=16
      - TIMEOUT=300
    ports:
      - "9621:9621"
    depends_on:
      - secondbrain-qdrant
    networks:
      - edge
    restart: unless-stopped

networks:
  edge:
    external: true
